name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    uses: ./.github/workflows/inspectra-generate.yml
    permissions:
      pages: write
      id-token: write
    with:
      dotnet-tool: JellyfinCli
      cli-name: jf
      with-xmldoc: true
      deploy-pages: true
      dotnet-version: '10.0.x'
      dotnet-quality: 'preview'
