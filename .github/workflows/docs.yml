name: Update GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/Jellyfin.Cli/**'
      - 'src/Jellyfin.Cli.Api/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-github-pages
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      # Pinned to a SHA on JKamsker/InSpectra@main; bump when upstream
      # ships changes you want to pick up.
      #
      # skip-inspectra-cli: the upstream action's dotnet mode tries to
      # `dotnet add package InSpectra.Cli`, which 404s on nuget.org. We
      # don't need it: Spectre.Console.Cli 0.53.1 already exposes
      # `cli opencli` and `cli xmldoc` natively for this project.
      - name: Render docs site
        uses: JKamsker/InSpectra/.github/actions/render@5f9f8949219fb171169fcfdc641de667ef9a6e4a
        with:
          mode: dotnet
          project: src/Jellyfin.Cli
          format: html
          title: JellyfinCli
          command-prefix: jf
          output-dir: _site
          skip-inspectra-cli: 'true'
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Checkout gh-pages base
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Sync rendered site
        shell: bash
        run: |
          set -euo pipefail

          find gh-pages -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            -exec rm -rf {} +

          cp -R _site/. gh-pages/
          printf '%s\n' 'jellyfin-cli.kamsker.at' > gh-pages/CNAME
          touch gh-pages/.nojekyll

      - name: Open PR if site changed
        uses: peter-evans/create-pull-request@v7
        with:
          path: gh-pages
          add-paths: .
          base: gh-pages
          branch: docs/regenerate-github-pages
          delete-branch: true
          commit-message: 'docs(pages): regenerate GitHub Pages site'
          title: 'docs(pages): regenerate GitHub Pages site'
          labels: |
            documentation
            automated
          body: |
            Auto-generated update to the `gh-pages` site via [InSpectra](https://github.com/JKamsker/InSpectra).

            Triggered by commit ${{ github.sha }} on `${{ github.ref_name }}`.

            If this PR is empty after merge it means the generated HTML site is
            unchanged from `gh-pages`; if you see a diff, review it carefully --
            it represents a change to the published CLI documentation site.
